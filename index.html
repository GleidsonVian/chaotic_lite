<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaotic Lite</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Chaotic Lite</h1>
        </header>
        
        <main id="board">
            <!-- O tabuleiro e as cartas serão renderizados aqui pelo JavaScript -->
            <p>Carregando o jogo...</p>
        </main>
        
        <div id="controls" style="margin-top: 20px; padding: 10px; background-color: #2c3e50; border-radius: 5px;">
            <button id="btn-next-turn" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold;">
                Passar Turno
            </button>
            <div id="combat-log" style="margin-top: 15px; font-size: 14px; color: #bdc3c7; height: 60px; overflow-y: auto;">
                Batalha pronta para iniciar!
            </div>
        </div>
    </div>

    <!-- Scripts de Dados -->
    <script src="src/js/data/cards.js"></script>
    <!-- Script Principal -->
    <script src="src/js/main.js"></script>
</body>
</html>

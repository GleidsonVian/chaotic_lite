<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaotic Lite</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Chaotic Lite</h1>
        </header>
        
        <div id="draft-screen">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: #f1c40f;">Fase de Escolha (Draft)</h2>
                <p>Selecione exatamente 6 criaturas para formar o seu exército!</p>
                <h3 id="draft-counter" style="margin-top: 10px; color: #2ecc71;">0 / 6 Escolhidas</h3>
                <button id="btn-start-battle" style="display: none; margin: 15px auto; padding: 10px 30px; font-size: 18px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; animation: pulse 1.5s infinite;">
                    INICIAR BATALHA
                </button>
            </div>
            <div id="draft-cards-container" class="cards-container">
                <!-- Cartas para escolha serão renderizadas aqui -->
            </div>
        </div>

        <div id="battle-screen" style="display: none;">
            <main id="board">
                <!-- O tabuleiro e as cartas serão renderizados aqui pelo JavaScript -->
            </main>
            
            <div id="controls" style="margin-top: 20px; padding: 10px; background-color: #2c3e50; border-radius: 5px; display: flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; gap: 20px;">
                    <div style="flex: 1;">
                        <h4 style="color: #f1c40f; margin-bottom: 5px;">Sua Mão (Mugics)</h4>
                        <div id="player-hand" style="display: flex; gap: 10px; height: 120px; overflow-x: auto;">
                            <!-- Mugics serão renderizados aqui -->
                        </div>
                    </div>
                    <div style="width: 200px; display: flex; flex-direction: column; justify-content: center;">
                        <button id="btn-next-turn" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold;">
                            Passar Turno
                        </button>
                    </div>
                </div>
                <div id="combat-log" style="font-size: 14px; color: #bdc3c7; height: 60px; overflow-y: auto; background: #1a252f; padding: 5px; border-radius: 3px;">
                    Batalha pronta para iniciar!
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts de Dados -->
    <script src="src/js/data/cards.js"></script>
    <script src="src/js/data/mugics.js"></script>
    <!-- Script Principal -->
    <script src="src/js/main.js"></script>
</body>
</html>
